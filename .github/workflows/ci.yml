name: CI

on:
  push:
    branches: [main, rewrite]
  pull_request:
    branches: [main, rewrite]

jobs:
  typecheck-and-test:
    name: Typecheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm turbo typecheck

      - name: Unit tests (API)
        run: pnpm --filter @pablo/api test

  e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @pablo/web exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter @pablo/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Run E2E tests
        run: pnpm --filter @pablo/web exec playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3002
          NEXT_PUBLIC_API_URL: http://localhost:4000
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  build-check:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @pablo/api build

      - name: Build Admin
        run: pnpm --filter @pablo/admin build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Build Web
        run: pnpm --filter @pablo/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
