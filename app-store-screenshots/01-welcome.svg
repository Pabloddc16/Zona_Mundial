<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="2796" viewBox="0 0 1290 2796">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF6EE"/>
      <stop offset="100%" stop-color="#F5EFE0"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006341"/>
      <stop offset="100%" stop-color="#004a30"/>
    </linearGradient>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg)"/>

  <!-- Status bar area -->
  <text x="120" y="120" font-family="-apple-system, Helvetica" font-size="34" font-weight="600" fill="#0B1F15">9:41</text>
  <g transform="translate(1050, 95)">
    <rect width="120" height="40" rx="4" fill="none" stroke="#0B1F15" stroke-width="3"/>
    <rect x="5" y="5" width="100" height="30" fill="#0B1F15"/>
    <rect x="125" y="14" width="6" height="22" fill="#0B1F15"/>
  </g>

  <!-- Logo circle -->
  <g transform="translate(645, 480)">
    <circle r="160" fill="#FFFFFF" stroke="#FFD100" stroke-width="9"/>
    <text x="0" y="-30" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="40" font-weight="900" letter-spacing="6" fill="#006341">CROMOS</text>
    <text x="0" y="40" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="100" font-weight="900" fill="#0B1F15">26</text>
    <text x="0" y="100" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="30" fill="#7A8B82">★</text>
  </g>

  <!-- Brand label -->
  <text x="645" y="780" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="38" font-weight="900" letter-spacing="10" fill="#006341">CROMOS 26</text>

  <!-- Headline -->
  <text x="645" y="920" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="76" font-weight="900" fill="#0B1F15">Tu álbum vive</text>
  <text x="645" y="1010" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="76" font-weight="900" fill="#0B1F15">en tu bolsillo.</text>

  <!-- Sub -->
  <text x="645" y="1110" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="38" fill="#5E6E66">Marca estampas. Intercambia con</text>
  <text x="645" y="1160" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="38" fill="#5E6E66">amigos. Completa tu colección.</text>

  <!-- Email CTA button -->
  <g transform="translate(120, 1640)">
    <rect width="1050" height="140" rx="70" fill="url(#cta)" stroke="#FFD100" stroke-width="5"/>
    <text x="525" y="92" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="42" font-weight="900" fill="#FFFFFF">Crear cuenta con email</text>
  </g>

  <!-- Divider -->
  <line x1="320" y1="1880" x2="540" y2="1880" stroke="#D5CFC0" stroke-width="2"/>
  <text x="645" y="1893" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="28" font-weight="800" letter-spacing="4" fill="#A4A89F">O</text>
  <line x1="750" y1="1880" x2="970" y2="1880" stroke="#D5CFC0" stroke-width="2"/>

  <!-- Google button -->
  <g transform="translate(120, 1960)">
    <rect width="1050" height="130" rx="65" fill="#FFFFFF" stroke="#E4DDCB" stroke-width="2"/>
    <circle cx="100" cy="65" r="22" fill="none" stroke="#0B1F15" stroke-width="4"/>
    <text x="100" y="78" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="32" font-weight="900" fill="#0B1F15">G</text>
    <text x="525" y="85" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="40" font-weight="700" fill="#0B1F15">Continuar con Google</text>
  </g>

  <!-- Apple button -->
  <g transform="translate(120, 2120)">
    <rect width="1050" height="130" rx="65" fill="#FFFFFF" stroke="#E4DDCB" stroke-width="2"/>
    <text x="100" y="84" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="48" fill="#0B1F15">🍎</text>
    <text x="525" y="85" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="40" font-weight="700" fill="#0B1F15">Continuar con Apple</text>
  </g>

  <!-- Sign in link -->
  <text x="645" y="2360" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="32" fill="#5E6E66">¿Ya tienes cuenta? <tspan font-weight="900" fill="#006341">Iniciar sesión</tspan></text>

  <!-- Disclaimer -->
  <text x="645" y="2540" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="24" fill="#9CA192">App independiente para coleccionistas.</text>
  <text x="645" y="2580" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="24" fill="#9CA192">No afiliada con marcas o eventos.</text>
</svg>
