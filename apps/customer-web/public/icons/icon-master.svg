<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFE490"/>
      <stop offset="38%"  stop-color="#F5C430"/>
      <stop offset="72%"  stop-color="#C68F1E"/>
      <stop offset="100%" stop-color="#8B5E10"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5CC8DD"/>
      <stop offset="100%" stop-color="#2FA9C2"/>
    </linearGradient>
  </defs>

  <!-- Off-white card -->
  <rect width="512" height="512" rx="100" ry="100" fill="#FAF6EE"/>

  <!-- Big chunky "2" — left -->
  <text x="148" y="400"
        text-anchor="middle"
        font-family="Archivo Black, Arial Black, Impact, system-ui, sans-serif"
        font-weight="900"
        font-size="460"
        fill="url(#cyanGrad)"
        letter-spacing="-8">2</text>

  <!-- Big chunky "6" — right -->
  <text x="370" y="400"
        text-anchor="middle"
        font-family="Archivo Black, Arial Black, Impact, system-ui, sans-serif"
        font-weight="900"
        font-size="460"
        fill="url(#cyanGrad)"
        letter-spacing="-8">6</text>

  <!-- Trophy nestled in the "2" -->
  <g transform="translate(86,90)">
    <!-- Globe top -->
    <ellipse cx="68" cy="50" rx="44" ry="40" fill="url(#goldGrad)"/>
    <ellipse cx="68" cy="50" rx="44" ry="40" fill="none" stroke="#5C3F0A" stroke-width="3"/>

    <!-- Cup hourglass body -->
    <path d="M 32,80
             C 22,178 28,200 68,225
             C 108,200 114,178 104,80
             C 100,108 84,116 68,116
             C 52,116 36,108 32,80 Z"
          fill="url(#goldGrad)" stroke="#5C3F0A" stroke-width="3"/>

    <!-- Stem -->
    <path d="M 56,225 L 80,225 L 84,265 L 52,265 Z"
          fill="url(#goldGrad)" stroke="#5C3F0A" stroke-width="3"/>

    <!-- Green base with gold border -->
    <rect x="22" y="263" width="92" height="32" rx="5"
          fill="#0F4D2E" stroke="url(#goldGrad)" stroke-width="4"/>

    <!-- "MUNDIAL" engraved on base -->
    <text x="68" y="285"
          text-anchor="middle"
          font-family="Archivo Black, Arial Black, sans-serif"
          font-weight="900"
          font-size="14"
          fill="#FFE38A"
          letter-spacing="1.5">MUNDIAL</text>

    <!-- Subtle highlight on globe -->
    <ellipse cx="55" cy="38" rx="15" ry="8" fill="#FFF4C2" opacity="0.55"/>
  </g>

  <!-- Small "26" wordmark below -->
  <text x="256" y="468"
        text-anchor="middle"
        font-family="Archivo Black, Arial Black, sans-serif"
        font-weight="900"
        font-size="34"
        fill="#0E2A1E"
        letter-spacing="6">MUNDIAL26</text>
</svg>
