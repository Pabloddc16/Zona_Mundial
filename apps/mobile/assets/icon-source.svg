<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A38"/>
      <stop offset="100%" stop-color="#0E1722"/>
    </linearGradient>
  </defs>

  <!-- Fully opaque background — Apple rejects PNGs with alpha. -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft inner glow -->
  <circle cx="512" cy="450" r="380" fill="#243646" opacity="0.4"/>

  <!-- Central monogram -->
  <g transform="translate(512, 512)">
    <!-- Star glyph behind letter for depth -->
    <text x="0" y="-160" text-anchor="middle"
          font-family="-apple-system, Helvetica, Arial" font-size="120"
          fill="#E8A93E" opacity="0.9">★</text>

    <!-- Letter C, bold sans -->
    <text x="0" y="80" text-anchor="middle"
          font-family="-apple-system, Helvetica, Arial" font-size="420"
          font-weight="900" letter-spacing="-20" fill="#FAF6EE">C</text>

    <!-- Subtle baseline mark -->
    <rect x="-130" y="170" width="260" height="6" rx="3" fill="#E8A93E" opacity="0.9"/>
  </g>
</svg>
